version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cpi2_0
      MYSQL_USER: root
      MYSQL_PASSWORD:
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 5
      timeout: 3s

  api:
    build: ./API
    container_name: api_node
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./API/.env
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: